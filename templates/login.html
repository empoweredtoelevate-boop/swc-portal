<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWC Command Center — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #F5F0EB;
    --card: #FFFFFF;
    --text: #2D2D2D;
    --text-muted: #8B7B6B;
    --beige: #C8B89A;
    --beige-light: #E8DFD0;
    --accent: #3D3D3D;
    --green: #4CAF50;
    --red: #E57373;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }
  .login-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 48px 40px;
    text-align: center;
  }
  .logo {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .logo-sub {
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 36px;
    letter-spacing: -0.5px;
  }
  .form-group {
    margin-bottom: 18px;
    text-align: left;
  }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--beige-light);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    background: white;
  }
  .form-group input:focus {
    border-color: var(--beige);
  }
  .login-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.5px;
    margin-top: 8px;
  }
  .login-btn:hover { opacity: 0.85; }
  .error-msg {
    background: #FFEBEE;
    color: #C62828;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 20px;
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo">SWC</div>
    <div class="logo-sub">Command Center</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
  <div class="footer">Stefanie Will Coaching &middot; Aligned & Fit</div>
</div>
</body>
</html>
